name: Code Quality

on:
  pull_request:
    branches: [ main ]

permissions:
  contents: read

jobs:
  code-quality:
    name: Code Quality Checks
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

    - name: Set up Python
      uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
      with:
        python-version-file: '.python-version'

    - name: Install uv
      uses: astral-sh/setup-uv@cec208311dfd045dd5311c1add060b2062131d57 # v8.0.0
      with:
        enable-cache: true

    - name: Install dependencies
      run: uv sync --frozen

    - name: Check code formatting (ruff)
      run: uv run ruff format . --check

    - name: Run linting (ruff)
      run: uv run ruff check .

    - name: Run type checking (pyright)
      run: uv run pyright

    - name: Set up Helm
      uses: azure/setup-helm@dda3372f752e03dde6b3237bc9431cdc2f7a02a2 # v5.0.0

    - name: Validate Helm chart templates
      run: |
        helm template test helm/cloudflare-prometheus-exporter > /tmp/helm-output.yaml
        yq eval '.' /tmp/helm-output.yaml > /dev/null
        echo "Rendered resources:"
        yq eval '.kind + "/" + .metadata.name' /tmp/helm-output.yaml
