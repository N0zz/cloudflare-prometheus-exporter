name: Code Quality

on:
  pull_request:
    branches: [ main ]

permissions:
  contents: read

jobs:
  code-quality:
    name: Code Quality Checks
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

    - name: Set up Python
      uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
      with:
        python-version-file: '.python-version'

    - name: Install uv
      uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
      with:
        enable-cache: true

    - name: Install dependencies
      run: uv sync --frozen

    - name: Check code formatting (ruff)
      run: uv run ruff format . --check

    - name: Run linting (ruff)
      run: uv run ruff check .

    - name: Run type checking (pyright)
      run: uv run pyright

    - name: Set up Helm
      uses: azure/setup-helm@9bc31f4ebc9c6b171d7bfbaa5d006ae7abdb4310 # v5.0.1

    - name: Validate Helm chart templates
      run: |
        helm template test helm/cloudflare-prometheus-exporter > /tmp/helm-output.yaml
        yq eval '.' /tmp/helm-output.yaml > /dev/null
        echo "Rendered resources:"
        yq eval '.kind + "/" + .metadata.name' /tmp/helm-output.yaml
