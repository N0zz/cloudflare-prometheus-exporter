name: Tests

on:
  pull_request:
    branches: [ main ]

permissions:
  contents: read

jobs:
  unit-test:
    name: Unit Tests
    runs-on: ubuntu-latest

    permissions:
      id-token: write # Required for Codecov token

    steps:
    - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      with:
        fetch-depth: 0

    - name: Set up Python
      uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
      with:
        python-version-file: '.python-version'

    - name: Install uv
      uses: astral-sh/setup-uv@cec208311dfd045dd5311c1add060b2062131d57 # v8.0.0
      with:
        enable-cache: true

    - name: Install dependencies
      run: uv sync --frozen

    - name: Setup dummy Cloudflare token
      run: |
        echo "CF_API_TOKEN=dummy" >> $GITHUB_ENV

    - name: Run unit tests with coverage
      run: uv run pytest tests/unit/ --cov=cloudflare_exporter --cov-report=xml

    - name: Upload coverage reports to Codecov
      uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v7.0.0
      env:
        CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
      with:
        files: coverage.xml
        fail_ci_if_error: true
        flags: unittests
        verbose: true

  integration-test:
    name: Integration Tests
    runs-on: ubuntu-latest

    steps:
    - name: Check for Cloudflare token
      id: check_token
      env:
        CF_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
      run: |
        if [ -z "$CF_API_TOKEN" ]; then
          echo "skip=true" >> "$GITHUB_OUTPUT"
          echo "CF_API_TOKEN not available, skipping integration tests"
        else
          echo "skip=false" >> "$GITHUB_OUTPUT"
        fi

    - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      if: steps.check_token.outputs.skip == 'false'

    - name: Set up Python
      if: steps.check_token.outputs.skip == 'false'
      uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
      with:
        python-version-file: '.python-version'

    - name: Install uv
      if: steps.check_token.outputs.skip == 'false'
      uses: astral-sh/setup-uv@cec208311dfd045dd5311c1add060b2062131d57 # v8.0.0
      with:
        enable-cache: true

    - name: Install dependencies
      if: steps.check_token.outputs.skip == 'false'
      run: uv sync --frozen

    - name: Run integration tests
      if: steps.check_token.outputs.skip == 'false'
      env:
        CF_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
      run: uv run pytest tests/integration/ -v
