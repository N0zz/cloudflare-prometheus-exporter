name: Tests

on:
  pull_request:
    branches: [ main ]

permissions:
  contents: read

jobs:
  unit-test:
    name: Unit Tests
    runs-on: ubuntu-latest

    permissions:
      id-token: write # Required for Codecov token

    steps:
    - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      with:
        fetch-depth: 0

    - name: Set up Python
      uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
      with:
        python-version-file: '.python-version'

    - name: Install uv
      uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
      with:
        enable-cache: true

    - name: Install dependencies
      run: uv sync --frozen

    - name: Setup dummy Cloudflare token
      run: |
        echo "CF_API_TOKEN=dummy" >> $GITHUB_ENV

    - name: Run unit tests with coverage
      run: uv run pytest tests/unit/ --cov=cloudflare_exporter --cov-report=xml

    - name: Upload coverage reports to Codecov
      uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v6.0.2
      env:
        CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
      with:
        files: coverage.xml
        fail_ci_if_error: true
        flags: unittests
        verbose: true

  integration-test:
    name: Integration Tests
    runs-on: ubuntu-latest

    steps:
    - name: Check for Cloudflare token
      id: check_token
      env:
        CF_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
      run: |
        if [ -z "$CF_API_TOKEN" ]; then
          echo "skip=true" >> "$GITHUB_OUTPUT"
          echo "CF_API_TOKEN not available, skipping integration tests"
        else
          echo "skip=false" >> "$GITHUB_OUTPUT"
        fi

    - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      if: steps.check_token.outputs.skip == 'false'

    - name: Set up Python
      if: steps.check_token.outputs.skip == 'false'
      uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
      with:
        python-version-file: '.python-version'

    - name: Install uv
      if: steps.check_token.outputs.skip == 'false'
      uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
      with:
        enable-cache: true

    - name: Install dependencies
      if: steps.check_token.outputs.skip == 'false'
      run: uv sync --frozen

    - name: Run integration tests
      if: steps.check_token.outputs.skip == 'false'
      env:
        CF_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
      run: uv run pytest tests/integration/ -v
