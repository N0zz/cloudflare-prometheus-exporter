name: Release

on:
  push:
    branches: [ main ]
    paths:
      - 'cloudflare_exporter/**'
      - 'pyproject.toml'
      - 'uv.lock'
      - 'Dockerfile'
  pull_request:
    branches: [ main ]
    paths:
      - 'cloudflare_exporter/**'
      - 'pyproject.toml'
      - 'uv.lock'
      - 'Dockerfile'
  release:
    types: [ published ]

permissions:
  contents: read

env:
  DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
  DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}

jobs:
  release-dry-run:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0
          ref: ${{ github.event.pull_request.head.ref }}
      - name: Semantic Release (dry run)
        uses: python-semantic-release/python-semantic-release@350c48fcb3ffcdfd2e0a235206bc2ecea6b69df0 # v10.5.3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          verbosity: "2"
          no_operation_mode: "true"

  # On merge: create draft release + build RC docker image
  release-gh:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.semantic_release.outputs.version }}
      released: ${{ steps.semantic_release.outputs.released }}

    permissions:
      contents: write
      pull-requests: write
      packages: write
      id-token: write

    steps:
      - name: Generate App Token
        id: app-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}

      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0
          token: ${{ steps.app-token.outputs.token }}

      - name: Python Semantic Release
        id: semantic_release
        uses: python-semantic-release/python-semantic-release@350c48fcb3ffcdfd2e0a235206bc2ecea6b69df0 # v10.5.3
        with:
          github_token: ${{ steps.app-token.outputs.token }}
          vcs_release: "false"

      - name: Create draft release
        if: steps.semantic_release.outputs.released == 'true'
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          VERSION="${{ steps.semantic_release.outputs.version }}"
          REPO="nulltix/cloudflare-prometheus-exporter"
          CHART_REPO="https://n0zz.github.io/cloudflare-prometheus-exporter"

          gh release create "v${VERSION}" \
            --draft \
            --title "v${VERSION}" \
            --generate-notes

          NOTES=$(gh release view "v${VERSION}" --json body -q .body)
          gh release edit "v${VERSION}" --notes "${NOTES}

          ## Docker

          \`\`\`bash
          docker pull ${REPO}:${VERSION}-rc
          # After publishing this release:
          docker pull ${REPO}:${VERSION}
          \`\`\`

          [View on DockerHub](https://hub.docker.com/r/${REPO}/tags)

          ## Helm Chart

          \`\`\`bash
          helm repo add cloudflare-exporter ${CHART_REPO}
          helm repo update
          helm install my-release cloudflare-exporter/cloudflare-prometheus-exporter
          \`\`\`

          [Chart Repository](${CHART_REPO})"

  rc-docker:
    needs: release-gh
    if: github.event_name == 'push' && needs.release-gh.outputs.released == 'true'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Set up QEMU
        uses: docker/setup-qemu-action@96fe6ef7f33517b61c61be40b68a1882f3264fb8 # v4.2.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0

      - name: Login to Docker Hub
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          username: ${{ env.DOCKERHUB_USERNAME }}
          password: ${{ env.DOCKERHUB_TOKEN }}

      - name: Build and push RC image
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ env.DOCKERHUB_USERNAME }}/cloudflare-prometheus-exporter:${{ needs.release-gh.outputs.version }}-rc

  # On manual release publish: tag final docker image
  release-docker:
    if: github.event_name == 'release'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Set up QEMU
        uses: docker/setup-qemu-action@96fe6ef7f33517b61c61be40b68a1882f3264fb8 # v4.2.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0

      - name: Login to Docker Hub
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          username: ${{ env.DOCKERHUB_USERNAME }}
          password: ${{ env.DOCKERHUB_TOKEN }}

      - name: Get version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Build and push release image
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ env.DOCKERHUB_USERNAME }}/cloudflare-prometheus-exporter:${{ steps.version.outputs.version }}
            ${{ env.DOCKERHUB_USERNAME }}/cloudflare-prometheus-exporter:latest
